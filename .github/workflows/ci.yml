name: CI # Continuous Integration

on:
    push:
        branches:
            - main
    pull_request:
    # Weekly schedule for dependency-vulnerability scanning (Tier-1 audit
    # item #09 / Finding X). The cron picks up newly-published CVEs that
    # land after the PR that introduced the dependency.
    schedule:
        -   cron: "0 6 * * 1"  # Mondays 06:00 UTC
    workflow_dispatch:

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository
                uses: actions/checkout@v6

            -   name: Set up UV Environment
                uses: astral-sh/setup-uv@v8.3.2

            -   name: Verify lockfile is up to date
                run: uv lock --check

            -   name: Synchronize Dependencies for Linting
                run: uv sync --quiet

            -   name: Check Code Formatting
                run: uvx ruff format --check .

            -   name: Lint Code
                run: uvx ruff check .

            -   name: Type Check (ty)
                # `continue-on-error` because the project has ~170 existing
                # type diagnostics that pre-date the audit. Treat failures
                # as advisory until Tier 2 cleanup work brings them down to
                # zero, then remove `continue-on-error`. Tracked in
                # docs/audits/2026-07-12-technical-due-diligence.md Finding W.
                run: uvx ty check src/llm/
                continue-on-error: true

    build-and-test:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
            fail-fast: false

        steps:
            -   name: Checkout repository
                uses: actions/checkout@v6

            -   name: Set up UV Environment
                uses: astral-sh/setup-uv@v8.3.2

            -   name: Verify lockfile is up to date
                run: uv lock --check

            -   name: Synchronize Dependencies
                run: uv sync --frozen

            -   name: Build Project
                run: uv build

            -   name: Run Full Tests with Coverage
                run: make test-cov

            -   name: Upload coverage report as artifact
                if: always() # Ensure it runs even if tests fail, to upload partial coverage
                uses: actions/upload-artifact@v7
                with:
                    name: coverage-report-${{ matrix.os }} # Make artifact name unique per OS
                    path: |
                        coverage.xml
                        htmlcov/

    security:
        # Tier-1 audit item #09 / Finding X. Two gates:
        #   - pip-audit: scans the locked dependency set for known CVEs
        #   - bandit:   static security analysis of the source tree
        # pip-audit runs on PR, push, AND weekly cron (the cron catches
        # CVEs that are published after a dependency lands). bandit runs
        # on PR and push only.
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository
                uses: actions/checkout@v6

            -   name: Set up UV Environment
                uses: astral-sh/setup-uv@v8.3.2

            -   name: Verify lockfile is up to date
                run: uv lock --check

            -   name: Synchronize Dependencies
                run: uv sync --frozen

            -   name: Install pip-audit and bandit
                run: uv tool install pip-audit bandit

            -   name: Audit locked dependencies (pip-audit)
                # Strict: any known CVE in the lockfile fails the build.
                # Renovate also updates dependencies weekly, but pip-audit
                # adds a second layer for transitive vulnerabilities.
                run: uv tool run pip-audit --strict

            -   name: Static security analysis (bandit)
                # High+ severity findings fail the build. Lower severities
                # are reported as warnings.
                run: uv tool run bandit -r src/llm/ --severity-level high
