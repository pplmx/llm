site_name: LLM Framework Documentation
site_description: A modular PyTorch framework for training and serving Large Language Models
site_url: https://pplmx.github.io/llm
repo_url: https://github.com/pplmx/llm
repo_name: pplmx/llm

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang: zh

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

nav:
  - 🚀 快速开始:
      - getting-started.md
      - tutorials/01-pretraining.md
      - tutorials/02-finetuning.md
      - tutorials/03-inference.md
  
  - 📖 教程:
      - Tutorial: tutorial-cpu-llm.md
      - FAQ: faq.md
  
  - 🔧 指南:
      - Checkpoints: guides/checkpoints.md
      - 分布式训练: guides/distributed.md
      - Fine-Tuning: guide-finetuning.md
      - Inference: guide-inference.md
  
  - 📚 参考:
      - CLI 命令: reference/cli.md
      - Architecture: architecture.md
  
  - 💻 开发:
      - development/README.md
      - development/components.md
      - development/training-flow.md
      - development/flow-callbacks.md
      - development/guide-configuration.md
      - development/guide-extending.md
      - development/deep-dive-ddp.md
      - development/troubleshooting.md
  
  - 📝 ADR:
      - adr/README.md
      - "001: GQA": adr/001-use-gqa.md
      - "002: SwiGLU": adr/002-use-swiglu.md
      - "003: KVCache": adr/003-use-kv-cache.md
      - "004: QLoRA": adr/004-use-qlora.md
  
  - ❓ 故障排除: troubleshooting.md