site_name: LLM Framework Documentation
site_description: A modular PyTorch framework for training and serving Large Language Models
site_url: https://pplmx.github.io/llm
repo_url: https://github.com/pplmx/llm
repo_name: pplmx/llm

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang: zh
  # mkdocstrings auto-generates API reference pages from Python
  # docstrings. Pages live under docs/api/ and use the
  # ```:: llm.something ``` fenced-block directive.
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          # Some subpackages (e.g. ``llm.training``) are namespace
          # packages — they don't ship ``__init__.py``. The
          # ``forgiving_parsing`` + ``new_path_syntax`` flags below
          # let mkdocstrings resolve them anyway.
          new_path_syntax: true
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            separate_signature: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            # Avoid generating docs for private helpers; use
            # ::: llm.module filter when you need them on a specific page.
            filters: ["!^_"]
            # Cap the inherited-members list at 2 levels so the page
            # doesn't get dominated by ``object`` machinery.
            inherited_members: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

nav:
  - 🚀 快速开始:
      - getting-started.md
      - tutorials/01-pretraining.md
      - tutorials/02-finetuning.md
      - tutorials/03-inference.md
  
  - 🔧 指南:
      - guides/checkpoints.md
      - guides/data.md
      - guides/distributed.md
      - guides/finetuning.md
      - guides/inference.md
      - guides/evaluation.md
  
  - 💻 开发:
      - development/README.md
      - development/components.md
      - development/training-flow.md
      - development/flow-callbacks.md
      - development/guide-configuration.md
      - development/guide-extending.md
      - development/deep-dive-ddp.md
      - development/troubleshooting.md
  
  - 📚 参考:
      - reference/architecture.md
      - reference/cli.md
      - 🔌 API Reference:
          - api/index.md
          - api/core.md
          - api/runtime.md
          - api/models.md
          - api/generation.md
          - api/serving.md
          - api/training.md
          - api/evaluation.md
          - api/data.md
  
  - 📝 ADR:
      - adr/README.md
      - "001: GQA": adr/001-use-gqa.md
      - "002: SwiGLU": adr/002-use-swiglu.md
      - "003: KVCache": adr/003-use-kv-cache.md
      - "004: QLoRA": adr/004-use-qlora.md
  
  - ❓ FAQ: faq.md
  - 🔧 故障排除: troubleshooting.md