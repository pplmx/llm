target-version = "py314"
line-length = 120

[lint]
select = [
    "E", "W", "F",
    "I",
    "B", "C4", "UP", "SIM", "RUF",
    "PTH",
    "ARG001",
    "PT",
    "N",
    # Domain-specific
    "FAST", "ASYNC",
    "BLE", "PERF",
    "S",
]

ignore = [
    "E501",
    "B008",
    "B904",
]

[lint.per-file-ignores]
"tests/**" = ["S101"]  
"scripts/**" = ["T201"]
